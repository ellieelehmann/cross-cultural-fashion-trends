# Cross-Cultural Fashion Trend Mapping
# Case-study configuration.
#
# Central research question:
#   "Does the same fashion aesthetic mean the same thing across cultures?"
#
# Each aesthetic groups regional/linguistic equivalents used to search,
# tag, and discuss it online. All keyword variants map back to a single
# canonical aesthetic so that trend and sentiment signals from different
# languages can be compared on the same axes.

primary_aesthetic: quiet_luxury

aesthetics:
  quiet_luxury:
    display_name: Quiet Luxury
    description: >
      Restrained, high-quality, logo-averse luxury aesthetic often
      associated with "old money" dressing.
    markets:
      - market: US
        country_code: US
        language: en
        keywords:
          - quiet luxury
          - old money aesthetic
          - stealth wealth
          - understated luxury
      - market: FR
        country_code: FR
        language: fr
        keywords:
          - luxe discret
          - style old money
          - luxe silencieux
      - market: KR
        country_code: KR
        language: ko
        keywords:
          - 올드머니룩
          - 조용한 럭셔리
          - 미니멀 럭셔리
      - market: JP
        country_code: JP
        language: ja
        keywords:
          - クワイエットラグジュアリー
          - オールドマネー ファッション
          - 上品カジュアル

    # Real quiet-luxury brands to track across every market.
    # `aliases` provides the search string in each market's language so we
    # capture native transliterations (e.g. "The Row" -> "더 로우" in Korean).
    brands:
      - name: The Row
        origin: US
        aliases:
          en: The Row
          fr: The Row
          ko: 더 로우
          ja: ザ・ロウ
      - name: Loro Piana
        origin: IT
        aliases:
          en: Loro Piana
          fr: Loro Piana
          ko: 로로피아나
          ja: ロロ・ピアーナ
      - name: Brunello Cucinelli
        origin: IT
        aliases:
          en: Brunello Cucinelli
          fr: Brunello Cucinelli
          ko: 브루넬로 쿠치넬리
          ja: ブルネロ クチネリ
      - name: Khaite
        origin: US
        aliases:
          en: Khaite
          fr: Khaite
          ko: 카이트
          ja: ケイト
      - name: Toteme
        origin: SE
        aliases:
          en: Toteme
          fr: Toteme
          ko: 토템
          ja: トーテム
      - name: Lemaire
        origin: FR
        aliases:
          en: Lemaire
          fr: Lemaire
          ko: 르메르
          ja: ルメール
      - name: Hermes
        origin: FR
        aliases:
          en: Hermes
          fr: Hermès
          ko: 에르메스
          ja: エルメス
      - name: Max Mara
        origin: IT
        aliases:
          en: Max Mara
          fr: Max Mara
          ko: 막스마라
          ja: マックスマーラ
      - name: Jil Sander
        origin: DE
        aliases:
          en: Jil Sander
          fr: Jil Sander
          ko: 질 샌더
          ja: ジル サンダー
      - name: Auralee
        origin: JP
        aliases:
          en: Auralee
          fr: Auralee
          ko: 오랄리
          ja: オーラリー

  punk_grunge:
    display_name: Punk / Grunge
    description: >
      DIY, subcultural, anti-establishment fashion aesthetic drawing on
      1970s British punk and 1990s Pacific Northwest grunge. Ripped,
      layered, deconstructed, dark, and deliberately imperfect.
    markets:
      - market: US
        country_code: US
        language: en
        keywords:
          - grunge aesthetic
          - punk fashion
          - 90s grunge
          - riot grrrl style
      - market: FR
