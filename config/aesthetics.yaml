# Time window used across all sources for the trend layer.
time_window:
  start: "2023-01-01"
  end: "2026-06-30"
  granularity: month

# Which text sources feed the NLP layer. Reddit and public search-result
# snippets are treated as first-class sources; social platforms with
# fragile scraping (TikTok, Instagram) are optional enrichment only.
text_sources:
  reddit:
    enabled: true
    subreddits:
      - femalefashionadvice
      - malefashionadvice
      - streetwear
      - fashion
      - koreanfashion
      - japanesefashion
    post_limit_per_keyword: 50
  youtube:
    enabled: false
    note: Requires YouTube Data API key.
  news:
    enabled: true
    note: Uses NewsAPI or a static curated set for fashion editorial voice.
